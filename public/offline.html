<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – HyperCity</title>
  <style>
    body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Inter',sans-serif; background:#07050f; color:#f2efff; text-align:center; padding:20px; }
    .card { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:16px; padding:40px; max-width:400px; }
    h1 { font-size:1.8rem; margin:0 0 8px; }
    p { color:#9a92bd; line-height:1.5; }
    .icon { font-size:3rem; margin-bottom:16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>You’re offline</h1>
    <p>Please check your internet connection and try again.</p>
  </div>
</body>
</html>
